<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop stop-color="#052e16"/>
      <stop offset="1" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg3)"/>
  <rect x="100" y="120" width="1000" height="440" rx="24" fill="#0f172a" stroke="#166534" stroke-width="2"/>
  <text x="160" y="175" fill="#4ade80" font-family="monospace" font-size="20">// server.js — Express REST API</text>
  <text x="160" y="220" fill="#86efac" font-family="monospace" font-size="18">const express = require('express');</text>
  <text x="160" y="255" fill="#86efac" font-family="monospace" font-size="18">const app = express();</text>
  <text x="160" y="310" fill="#fbbf24" font-family="monospace" font-size="18">app.get('/api/users', getUsers);</text>
  <text x="160" y="345" fill="#fbbf24" font-family="monospace" font-size="18">app.post('/api/users', createUser);</text>
  <text x="160" y="380" fill="#fbbf24" font-family="monospace" font-size="18">app.put('/api/users/:id', updateUser);</text>
  <text x="160" y="415" fill="#fbbf24" font-family="monospace" font-size="18">app.delete('/api/users/:id', deleteUser);</text>
  <text x="160" y="470" fill="#86efac" font-family="monospace" font-size="18">app.listen(5000);</text>
  <g transform="translate(780,200)">
    <rect width="260" height="70" rx="12" fill="#339933" opacity="0.2" stroke="#4ade80" stroke-width="2"/>
    <text x="130" y="32" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="16" font-weight="700">GET</text>
    <text x="130" y="55" text-anchor="middle" fill="#bbf7d0" font-family="monospace" font-size="14">/api/products</text>
    <rect y="90" width="260" height="70" rx="12" fill="#339933" opacity="0.2" stroke="#4ade80" stroke-width="2"/>
    <text x="130" y="122" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="16" font-weight="700">POST</text>
    <text x="130" y="145" text-anchor="middle" fill="#bbf7d0" font-family="monospace" font-size="14">/api/auth/login</text>
    <rect y="180" width="260" height="70" rx="12" fill="#339933" opacity="0.2" stroke="#4ade80" stroke-width="2"/>
    <text x="130" y="212" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="16" font-weight="700">PUT</text>
    <text x="130" y="235" text-anchor="middle" fill="#bbf7d0" font-family="monospace" font-size="14">/api/orders/:id</text>
  </g>
  <text x="600" y="620" text-anchor="middle" fill="#86efac" font-family="Arial,sans-serif" font-size="28" font-weight="700">Node.js + Express.js</text>
  <text x="600" y="655" text-anchor="middle" fill="#94a3b8" font-family="Arial,sans-serif" font-size="18">Scalable REST APIs &amp; server-side logic</text>
</svg>